# BU Profiles — configuration for BUAtlas personalization.
# Contains display names only (no PII). Heads and delegates are placeholder
# synthetic names. Real names loaded via Track A onboarding (items Q2, Q7).
# Owner: TBD — Track A discovery item Q2
# Last updated: 2026-04-22
schema_version: "1.0"

profiles:
  - bu_id: bu_alpha
    name: "Alpha BU"
    therapeutic_area: immunology
    head:
      name: "<head-alpha>"
      role: "Head of Alpha BU"
      delegate_ids:
        - "<delegate-alpha-1>"
    # NOTE (prompt 07.7): kept in sync with bu_registry.yaml — see that file for rationale.
    owned_product_areas:
      - specialty_pharmacy
      - specialty_pharmacy_workflow
      - hcp_portal_ordering
      - prior_authorization
      - prior_authorization_submission
      - prescriber_attestation
      - formulary_lookup_integration
    preferences:
      channels:
        - teams
        - email
      quiet_hours:
        timezone: "America/Chicago"
        start: "18:00"
        end: "08:00"
      digest_opt_in: true
      max_notifications_per_week: 10
    active_initiatives:
      - "Q2 specialty pharmacy network expansion — accelerating regional coverage"
      - "Prior authorization turnaround time reduction program"
      - "HCP portal self-service onboarding initiative"
    escalation_contact:
      name: "<escalation-alpha>"
      role: "Director of Operations, Alpha BU"
    okrs_current_quarter:
      - "Reduce PA processing time by 20% by end of Q2"
      - "Achieve 95% HCP portal uptime SLA"

