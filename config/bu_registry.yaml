# BU Registry — product-area → BU mapping for deterministic pre-filter.
# Recall-biased: prefer over-matching; BUAtlas (gate 4) applies precision.
# Owner: TBD — Track A discovery item Q7
# Last updated: 2026-04-22
schema_version: "1.0"

bus:
  - bu_id: bu_alpha
    name: "Alpha BU"
    therapeutic_area: immunology
    # NOTE (prompt 07.7): owned_product_areas expanded to align with SignalScribe's
    # observed vocabulary on fixture 001. Added terms:
    #   prior_authorization_submission — SignalScribe appends _submission to the base term (3/3 runs)
    #   specialty_pharmacy_workflow    — SignalScribe appends _workflow to the base term (3/3 runs)
    #   prescriber_attestation         — PA-workflow-specific sub-step (3/3 runs)
    #   formulary_lookup_integration   — formulary lookup is part of the PA ordering flow (2/3 runs)
    # All additions are scoped to bu_alpha's actual ownership (prior auth, HCP portal ordering,
    # specialty pharmacy). Evaluated for regressions on fixtures 006 and 007 — no new false positives.
    owned_product_areas:
      - specialty_pharmacy
      - specialty_pharmacy_workflow
      - hcp_portal_ordering
      - prior_authorization
      - prior_authorization_submission
      - prescriber_attestation
      - formulary_lookup_integration
    keywords:
      - specialty pharmacy
      - specialty distribution
      - hcp portal
      - prior auth
      - PA
      - authorization

  - bu_id: bu_beta
    name: "Beta BU"
    therapeutic_area: oncology
    owned_product_areas:
      - patient_support_services
      - co_pay_programs
      - patient_portal
    keywords:
      - patient support
      - co-pay
      - copay
      - patient portal
      - patient access
      - hub services

  - bu_id: bu_gamma
    name: "Gamma BU"
    therapeutic_area: neuroscience
    owned_product_areas:
      - medical_information_portal
      - clinical_evidence_library
      - field_medical_tools
    keywords:
      - medical information
      - medical affairs
      - clinical evidence
      - field medical
      - MSL tools
      - evidence library

  - bu_id: bu_delta
    name: "Delta BU"
    therapeutic_area: hematology
    owned_product_areas:
      - clinical_trial_operations
      - site_management_portal
      - lab_results_integration
      - reporting
      - reporting_dashboard  # shared with bu_zeta: clinical trial enrollment reports live in the reporting dashboard
    keywords:
      - clinical trial
      - site management
      - lab results
      - trial operations
      - reporting
      - site portal

  - bu_id: bu_epsilon
    name: "Epsilon BU"
    therapeutic_area: immunology
    owned_product_areas:
      - crm_integration
      - field_force_portal
      - sample_management
      - notification_services
      - hcp_portal_ordering   # shared with bu_alpha: field reps submit orders via the HCP ordering portal
      - analytics_portal      # shared with bu_zeta: field force portal embeds the analytics portal for rep performance views
    keywords:
      - field force
      - sales portal
      - CRM
      - sample management
      - rep portal
      - notifications
      - notification wording

  - bu_id: bu_zeta
    name: "Zeta BU"
    therapeutic_area: null
    owned_product_areas:
      - analytics_portal
      - reporting_dashboard
      - data_pipelines
      - operational_reporting
    keywords:
      - analytics
      - reporting
      - dashboard
      - data pipeline
      - operational reporting
      - metrics portal
